<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NerdMadness 2026 - Head to Head</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="./js/config/firebase-config-compat.js"></script>
    <style>
        :root {
            --slate-900: #0f172a;
            --slate-800: #1e293b;
            --slate-700: #334155;
            --slate-600: #475569;
            --slate-400: #94a3b8;
            --slate-300: #cbd5e1;
            --slate-100: #f1f5f9;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-gold: #eab308;
            --accent-orange: #f97316;
            --accent-red: #ef4444;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, var(--slate-900) 0%, var(--slate-800) 100%);
            color: var(--slate-100);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 80px 20px 40px 20px;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, var(--slate-900) 0%, var(--slate-800) 100%);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo { height: 32px; width: auto; }

        .header-title {
            font-size: 16px;
            color: var(--slate-100);
            letter-spacing: 2px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .header-title span { color: var(--accent-gold); }

        .header-link {
            font-size: 12px;
            color: var(--slate-400);
            text-decoration: none;
            transition: color 0.2s;
        }

        .header-link:hover { color: var(--accent-blue); }

        .container { max-width: 1000px; margin: 0 auto; }

        .page-title { text-align: center; margin-bottom: 24px; }

        .page-title h1 {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .page-title p { color: var(--slate-400); font-size: 14px; }

        .matchup-selector {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            align-items: center;
        }

        .selector-side { display: flex; flex-direction: column; gap: 8px; }

        .selector-label {
            font-size: 11px;
            color: var(--slate-400);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .selector-label.you { color: var(--accent-cyan); }
        .selector-label.opponent { color: var(--accent-orange); }

        .selector-side select {
            background: var(--slate-700);
            border: 1px solid var(--slate-600);
            color: var(--slate-100);
            padding: 12px 14px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
        }

        .selector-side select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .vs-badge {
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-red));
            color: white;
            font-size: 14px;
            font-weight: 800;
            padding: 12px 16px;
            border-radius: 50%;
            text-transform: uppercase;
        }

        .scoreboard {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            margin-bottom: 24px;
            align-items: stretch;
        }

        .score-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .score-card.you { border-top: 4px solid var(--accent-cyan); }
        .score-card.opponent { border-top: 4px solid var(--accent-orange); }

        .score-card-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--slate-300);
            margin-bottom: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score-card-current {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 8px;
        }

        .score-card.you .score-card-current { color: var(--accent-cyan); }
        .score-card.opponent .score-card-current { color: var(--accent-orange); }

        .score-card-label {
            font-size: 10px;
            color: var(--slate-500);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }

        .score-card-max {
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .max-stat { text-align: center; }

        .max-stat-value {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent-gold);
        }

        .max-stat-label {
            font-size: 9px;
            color: var(--slate-500);
            text-transform: uppercase;
        }

        .vs-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .diff-badge {
            font-size: 24px;
            font-weight: 900;
            padding: 8px 16px;
            border-radius: 8px;
        }

        .diff-badge.winning {
            background: rgba(34, 197, 94, 0.2);
            color: var(--accent-green);
        }

        .diff-badge.losing {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }

        .diff-badge.tied {
            background: rgba(148, 163, 184, 0.2);
            color: var(--slate-300);
        }

        .verdict {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
        }

        .verdict-title {
            font-size: 12px;
            color: var(--slate-400);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .verdict-text {
            font-size: 18px;
            font-weight: 700;
        }

        .verdict-text.can-win { color: var(--accent-green); }
        .verdict-text.cannot-win { color: var(--accent-red); }
        .verdict-text.guaranteed { color: var(--accent-gold); }

        .verdict-detail {
            font-size: 13px;
            color: var(--slate-400);
            margin-top: 8px;
        }

        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-btn {
            background: var(--slate-700);
            color: var(--slate-300);
            border: 1px solid var(--slate-600);
            padding: 8px 16px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .filter-btn:hover { border-color: var(--accent-blue); }

        .filter-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        .picks-comparison { display: flex; flex-direction: column; gap: 10px; }

        .pick-row {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px 18px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            align-items: center;
        }

        .pick-row.same-pick {
            border-left: 4px solid var(--slate-500);
            opacity: 0.7;
        }

        .pick-row.different-pick {
            border-left: 4px solid var(--accent-purple);
        }

        .pick-row.decided { opacity: 0.5; }

        .pick-row.you-advantage {
            background: rgba(6, 182, 212, 0.1);
            border-left-color: var(--accent-cyan);
        }

        .pick-row.opponent-advantage {
            background: rgba(249, 115, 22, 0.1);
            border-left-color: var(--accent-orange);
        }

        .pick-side {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .pick-side.right { text-align: right; }

        .pick-team {
            font-size: 14px;
            font-weight: 600;
            color: var(--slate-100);
        }

        .pick-team .seed {
            color: var(--slate-400);
            font-weight: 400;
            font-size: 11px;
        }

        .pick-team.correct { color: var(--accent-green); }
        .pick-team.wrong { color: var(--accent-red); text-decoration: line-through; }

        .pick-points {
            font-size: 11px;
            color: var(--slate-500);
        }

        .pick-points.earned { color: var(--accent-green); font-weight: 600; }

        .pick-middle {
            text-align: center;
            min-width: 80px;
        }

        .pick-round {
            font-size: 10px;
            color: var(--slate-500);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pick-status {
            font-size: 16px;
            margin-top: 4px;
        }

        .swing-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            margin-top: 4px;
        }

        .swing-badge.you-swing {
            background: rgba(6, 182, 212, 0.2);
            color: var(--accent-cyan);
        }

        .swing-badge.opp-swing {
            background: rgba(249, 115, 22, 0.2);
            color: var(--accent-orange);
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: var(--slate-400);
        }

        .no-data-icon { font-size: 48px; margin-bottom: 16px; }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--slate-400);
        }

        .login-prompt {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }

        .login-prompt h2 { color: var(--slate-100); margin-bottom: 12px; }
        .login-prompt p { color: var(--slate-400); margin-bottom: 20px; }

        .login-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 32px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.2s;
        }

        .login-btn:hover { background: #2563eb; }

        @media (max-width: 768px) {
            .matchup-selector {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .vs-badge { margin: 0 auto; }
            .scoreboard { grid-template-columns: 1fr; }
            .vs-column { flex-direction: row; padding: 12px 0; }
            .pick-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .pick-side.right { text-align: left; }
            .pick-middle { order: -1; text-align: left; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-brand">
            <img src="https://firebasestorage.googleapis.com/v0/b/nerdfootball.firebasestorage.app/o/nerdfootball-nerd-2025.png?alt=media&token=de5cef91-c70e-49bc-ba71-6f993439b11e" alt="NerdMadness" class="header-logo">
            <span class="header-title"><span>NERD</span>MADNESS</span>
        </div>
        <a href="nerdmadness.html" class="header-link">← Back to Brackets</a>
    </div>

    <div class="container">
        <div class="page-title">
            <h1>⚔️ Head to Head</h1>
            <p>Compare brackets • Can you still win?</p>
        </div>

        <div id="content-area">
            <div class="loading">Loading...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = window.getFirebaseConfig();
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const BASE = 'artifacts/nerdbasketball/pools/nerdmadness_2026';

        const ROUND_MULTIPLIERS = {
            'round_of_64': 1,
            'round_of_32': 2,
            'sweet_16': 4,
            'elite_8': 8,
            'final_four': 16,
            'championship': 32
        };

        const MATCHUP_ID_TO_ROUND = {
            'R1': 'round_of_64',
            'R2': 'round_of_32',
            'R3': 'sweet_16',
            'R4': 'elite_8',
            'R5': 'final_four',
            'R6': 'championship'
        };

        const ROUND_DISPLAY = {
            'round_of_64': 'Rd 64',
            'round_of_32': 'Rd 32',
            'sweet_16': 'Sweet 16',
            'elite_8': 'Elite 8',
            'final_four': 'Final 4',
            'championship': 'Champ'
        };

        function getMatchupRound(matchupId) {
            const prefix = matchupId.substring(0, 2);
            return MATCHUP_ID_TO_ROUND[prefix] || 'round_of_64';
        }

        let allBrackets = [];
        let matchups = {};
        let teams = {};
        let userCache = {};
        let userBrackets = [];
        let selectedMyBracketId = null;
        let selectedOppBracketId = null;
        let comparisonData = [];
        let currentFilter = 'different';

        async function loadMatchupsAndTeams() {
            const [matchupsSnap, teamsSnap] = await Promise.all([
                db.collection(`${BASE}/matchups`).get(),
                db.collection(`${BASE}/teams`).get()
            ]);
            matchupsSnap.forEach(doc => { matchups[doc.id] = doc.data(); });
            teamsSnap.forEach(doc => { teams[doc.id] = doc.data(); });
        }

        async function loadUserDisplayName(userId) {
            if (userCache[userId]) return userCache[userId];
            try {
                const userDoc = await db.doc(`artifacts/nerdfootball/public/data/nerdfootball_users/${userId}`).get();
                if (userDoc.exists) {
                    const data = userDoc.data();
                    userCache[userId] = data.displayName || data.email || 'Unknown';
                } else {
                    userCache[userId] = 'Unknown';
                }
            } catch (e) {
                userCache[userId] = 'Unknown';
            }
            return userCache[userId];
        }

        async function loadAllBrackets() {
            const bracketsSnap = await db.collection(`${BASE}/brackets`)
                .where('active', '==', true)
                .get();

            allBrackets = [];
            const userPromises = [];

            bracketsSnap.forEach(doc => {
                const data = doc.data();
                if (data.isComplete) {
                    allBrackets.push({ id: doc.id, ...data });
                    userPromises.push(loadUserDisplayName(data.userId));
                }
            });

            await Promise.all(userPromises);
        }

        function loadUserBrackets(userId) {
            userBrackets = allBrackets.filter(b => b.userId === userId);
        }

        function calculateBracketStats(bracket) {
            let currentScore = 0;
            let maxPossible = 0;

            if (!bracket.picks) return { currentScore: 0, maxPossible: 0 };

            for (const [matchupId, pickedTeamId] of Object.entries(bracket.picks)) {
                const matchup = matchups[matchupId];
                if (!matchup) continue;

                const team = teams[pickedTeamId];
                const seed = team?.seed || 1;
                const round = getMatchupRound(matchupId);
                const multiplier = ROUND_MULTIPLIERS[round] || 1;
                const pts = multiplier * seed;

                if (matchup.winner_team_id && matchup.status === 'FINAL') {
                    if (pickedTeamId === matchup.winner_team_id) {
                        currentScore += pts;
                        maxPossible += pts;
                    }
                } else {
                    maxPossible += pts;
                }
            }

            return { currentScore, maxPossible };
        }

        function buildComparisonData(myBracket, oppBracket) {
            comparisonData = [];

            const allMatchupIds = new Set([
                ...Object.keys(myBracket.picks || {}),
                ...Object.keys(oppBracket.picks || {})
            ]);

            for (const matchupId of allMatchupIds) {
                const matchup = matchups[matchupId];
                if (!matchup) continue;

                const myPickId = myBracket.picks?.[matchupId];
                const oppPickId = oppBracket.picks?.[matchupId];

                const myTeam = teams[myPickId];
                const oppTeam = teams[oppPickId];

                const round = getMatchupRound(matchupId);
                const multiplier = ROUND_MULTIPLIERS[round] || 1;

                const mySeed = myTeam?.seed || 1;
                const oppSeed = oppTeam?.seed || 1;
                const myPts = multiplier * mySeed;
                const oppPts = multiplier * oppSeed;

                let myStatus = 'pending';
                let oppStatus = 'pending';
                let myEarned = 0;
                let oppEarned = 0;

                if (matchup.winner_team_id && matchup.status === 'FINAL') {
                    myStatus = myPickId === matchup.winner_team_id ? 'correct' : 'wrong';
                    oppStatus = oppPickId === matchup.winner_team_id ? 'correct' : 'wrong';
                    if (myStatus === 'correct') myEarned = myPts;
                    if (oppStatus === 'correct') oppEarned = oppPts;
                }

                const samePick = myPickId === oppPickId;
                const swingPts = samePick ? 0 : Math.abs(myPts - oppPts);

                comparisonData.push({
                    matchupId,
                    round,
                    roundName: ROUND_DISPLAY[round] || round,
                    region: matchup.region_id,
                    samePick,
                    myPickId,
                    oppPickId,
                    myTeam,
                    oppTeam,
                    mySeed,
                    oppSeed,
                    myPts,
                    oppPts,
                    myStatus,
                    oppStatus,
                    myEarned,
                    oppEarned,
                    swingPts,
                    decided: myStatus !== 'pending'
                });
            }

            comparisonData.sort((a, b) => {
                if (a.decided !== b.decided) return a.decided ? 1 : -1;
                if (!a.samePick && b.samePick) return -1;
                if (a.samePick && !b.samePick) return 1;
                return b.swingPts - a.swingPts;
            });
        }

        function renderUI() {
            const contentArea = document.getElementById('content-area');

            if (userBrackets.length === 0) {
                contentArea.innerHTML = `
                    <div class="login-prompt">
                        <h2>No Brackets Found</h2>
                        <p>You need a completed bracket to use head-to-head comparison.</p>
                        <a href="nerdmadness.html" class="login-btn">Go to Brackets</a>
                    </div>
                `;
                return;
            }

            const otherBrackets = allBrackets.filter(b => !userBrackets.some(ub => ub.id === b.id));

            if (otherBrackets.length === 0) {
                contentArea.innerHTML = `
                    <div class="login-prompt">
                        <h2>No Opponents Yet</h2>
                        <p>Waiting for other players to complete their brackets.</p>
                    </div>
                `;
                return;
            }

            const myBracket = userBrackets.find(b => b.id === selectedMyBracketId) || userBrackets[0];
            const oppBracket = allBrackets.find(b => b.id === selectedOppBracketId) || otherBrackets[0];

            selectedMyBracketId = myBracket.id;
            selectedOppBracketId = oppBracket.id;

            buildComparisonData(myBracket, oppBracket);

            const myStats = calculateBracketStats(myBracket);
            const oppStats = calculateBracketStats(oppBracket);

            const diff = myStats.currentScore - oppStats.currentScore;
            const diffClass = diff > 0 ? 'winning' : (diff < 0 ? 'losing' : 'tied');
            const diffText = diff > 0 ? `+${diff}` : (diff < 0 ? `${diff}` : 'TIED');

            let verdictClass = '';
            let verdictText = '';
            let verdictDetail = '';

            if (myStats.maxPossible < oppStats.currentScore) {
                verdictClass = 'cannot-win';
                verdictText = "❌ You can't catch them";
                verdictDetail = `Even if you win out, your max (${myStats.maxPossible}) is less than their current (${oppStats.currentScore})`;
            } else if (myStats.currentScore > oppStats.maxPossible) {
                verdictClass = 'guaranteed';
                verdictText = "🏆 You've already won!";
                verdictDetail = `Your current score (${myStats.currentScore}) beats their max possible (${oppStats.maxPossible})`;
            } else if (diff >= 0) {
                verdictClass = 'can-win';
                verdictText = "✅ You're in control";
                verdictDetail = `Stay ahead! Your max: ${myStats.maxPossible} vs their max: ${oppStats.maxPossible}`;
            } else {
                const needed = oppStats.currentScore - myStats.currentScore;
                verdictClass = 'can-win';
                verdictText = "⚡ You can still catch up!";
                verdictDetail = `Need ${needed} pts to tie. Your upside: ${myStats.maxPossible - myStats.currentScore} pts remaining`;
            }

            contentArea.innerHTML = `
                <div class="matchup-selector">
                    <div class="selector-side">
                        <div class="selector-label you">Your Bracket</div>
                        <select id="my-bracket-select" onchange="onMyBracketChange()">
                            ${userBrackets.map(b => `
                                <option value="${b.id}" ${b.id === selectedMyBracketId ? 'selected' : ''}>
                                    ${b.bracketName || 'Unnamed'}
                                </option>
                            `).join('')}
                        </select>
                    </div>
                    <div class="vs-badge">VS</div>
                    <div class="selector-side">
                        <div class="selector-label opponent">Opponent</div>
                        <select id="opp-bracket-select" onchange="onOppBracketChange()">
                            ${allBrackets.filter(b => b.id !== selectedMyBracketId).map(b => `
                                <option value="${b.id}" ${b.id === selectedOppBracketId ? 'selected' : ''}>
                                    ${b.bracketName || 'Unnamed'} (${userCache[b.userId] || 'Unknown'})
                                </option>
                            `).join('')}
                        </select>
                    </div>
                </div>

                <div class="scoreboard">
                    <div class="score-card you">
                        <div class="score-card-name">${myBracket.bracketName || 'Your Bracket'}</div>
                        <div class="score-card-current">${myStats.currentScore}</div>
                        <div class="score-card-label">Current Score</div>
                        <div class="score-card-max">
                            <div class="max-stat">
                                <div class="max-stat-value">${myStats.maxPossible}</div>
                                <div class="max-stat-label">Max Possible</div>
                            </div>
                            <div class="max-stat">
                                <div class="max-stat-value">${myStats.maxPossible - myStats.currentScore}</div>
                                <div class="max-stat-label">Upside</div>
                            </div>
                        </div>
                    </div>

                    <div class="vs-column">
                        <div class="diff-badge ${diffClass}">${diffText}</div>
                    </div>

                    <div class="score-card opponent">
                        <div class="score-card-name">${oppBracket.bracketName || 'Opponent'}</div>
                        <div class="score-card-current">${oppStats.currentScore}</div>
                        <div class="score-card-label">Current Score</div>
                        <div class="score-card-max">
                            <div class="max-stat">
                                <div class="max-stat-value">${oppStats.maxPossible}</div>
                                <div class="max-stat-label">Max Possible</div>
                            </div>
                            <div class="max-stat">
                                <div class="max-stat-value">${oppStats.maxPossible - oppStats.currentScore}</div>
                                <div class="max-stat-label">Upside</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="verdict">
                    <div class="verdict-title">Can You Win?</div>
                    <div class="verdict-text ${verdictClass}">${verdictText}</div>
                    <div class="verdict-detail">${verdictDetail}</div>
                </div>

                <div class="filter-bar">
                    <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" data-filter="all">All Picks</button>
                    <button class="filter-btn ${currentFilter === 'different' ? 'active' : ''}" data-filter="different">🎯 Different Picks</button>
                    <button class="filter-btn ${currentFilter === 'pending' ? 'active' : ''}" data-filter="pending">⏳ Pending</button>
                    <button class="filter-btn ${currentFilter === 'swing' ? 'active' : ''}" data-filter="swing">⚡ Swing Games</button>
                </div>

                <div class="picks-comparison" id="picks-comparison">
                    ${renderPicks()}
                </div>
            `;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentFilter = btn.dataset.filter;
                    document.getElementById('picks-comparison').innerHTML = renderPicks();
                });
            });
        }

        function renderPicks() {
            let filtered = comparisonData;

            if (currentFilter === 'different') {
                filtered = comparisonData.filter(c => !c.samePick);
            } else if (currentFilter === 'pending') {
                filtered = comparisonData.filter(c => !c.decided);
            } else if (currentFilter === 'swing') {
                filtered = comparisonData.filter(c => !c.samePick && !c.decided);
            }

            if (filtered.length === 0) {
                return `
                    <div class="no-data">
                        <div class="no-data-icon">⚔️</div>
                        <p>No picks match this filter.</p>
                    </div>
                `;
            }

            return filtered.map(pick => {
                const sameClass = pick.samePick ? 'same-pick' : 'different-pick';
                const decidedClass = pick.decided ? 'decided' : '';

                let advantageClass = '';
                if (!pick.samePick && !pick.decided) {
                    if (pick.myPts > pick.oppPts) advantageClass = 'you-advantage';
                    else if (pick.oppPts > pick.myPts) advantageClass = 'opponent-advantage';
                }

                const myTeamName = pick.myTeam?.team_name || 'TBD';
                const oppTeamName = pick.oppTeam?.team_name || 'TBD';

                const myTeamClass = pick.myStatus === 'correct' ? 'correct' : (pick.myStatus === 'wrong' ? 'wrong' : '');
                const oppTeamClass = pick.oppStatus === 'correct' ? 'correct' : (pick.oppStatus === 'wrong' ? 'wrong' : '');

                const myPointsClass = pick.myEarned > 0 ? 'earned' : '';
                const oppPointsClass = pick.oppEarned > 0 ? 'earned' : '';

                const myPointsText = pick.myEarned > 0 ? `+${pick.myEarned} earned` : `(${pick.myPts} potential)`;
                const oppPointsText = pick.oppEarned > 0 ? `+${pick.oppEarned} earned` : `(${pick.oppPts} potential)`;

                let statusIcon = '⏳';
                if (pick.decided) {
                    if (pick.myStatus === 'correct' && pick.oppStatus === 'wrong') statusIcon = '✅ You won';
                    else if (pick.myStatus === 'wrong' && pick.oppStatus === 'correct') statusIcon = '❌ They won';
                    else if (pick.myStatus === 'correct' && pick.oppStatus === 'correct') statusIcon = '🤝 Both right';
                    else statusIcon = '💀 Both wrong';
                }

                let swingHtml = '';
                if (!pick.samePick && !pick.decided && pick.swingPts > 0) {
                    const swingClass = pick.myPts > pick.oppPts ? 'you-swing' : 'opp-swing';
                    swingHtml = `<div class="swing-badge ${swingClass}">⚡ ${pick.swingPts}pt swing</div>`;
                }

                return `
                    <div class="pick-row ${sameClass} ${decidedClass} ${advantageClass}">
                        <div class="pick-side">
                            <div class="pick-team ${myTeamClass}">
                                <span class="seed">#${pick.mySeed}</span> ${myTeamName}
                            </div>
                            <div class="pick-points ${myPointsClass}">${myPointsText}</div>
                        </div>
                        <div class="pick-middle">
                            <div class="pick-round">${pick.roundName}</div>
                            <div class="pick-status">${statusIcon}</div>
                            ${swingHtml}
                        </div>
                        <div class="pick-side right">
                            <div class="pick-team ${oppTeamClass}">
                                <span class="seed">#${pick.oppSeed}</span> ${oppTeamName}
                            </div>
                            <div class="pick-points ${oppPointsClass}">${oppPointsText}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function onMyBracketChange() {
            selectedMyBracketId = document.getElementById('my-bracket-select').value;
            renderUI();
        }

        function onOppBracketChange() {
            selectedOppBracketId = document.getElementById('opp-bracket-select').value;
            renderUI();
        }

        async function signIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                await auth.signInWithPopup(provider);
            } catch (e) {
                console.error('Sign in error:', e);
            }
        }

        auth.onAuthStateChanged(async (user) => {
            const contentArea = document.getElementById('content-area');

            if (!user) {
                contentArea.innerHTML = `
                    <div class="login-prompt">
                        <h2>Sign In Required</h2>
                        <p>Sign in to compare your bracket against opponents.</p>
                        <button class="login-btn" onclick="signIn()">Sign In with Google</button>
                    </div>
                `;
                return;
            }

            contentArea.innerHTML = '<div class="loading">Loading brackets...</div>';

            try {
                await loadMatchupsAndTeams();
                await loadAllBrackets();
                loadUserBrackets(user.uid);
                renderUI();
            } catch (e) {
                console.error('Error:', e);
                contentArea.innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">⚠️</div>
                        <p>Error loading data. Please try again.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
