<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NerdMadness - Game Results Admin</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="./js/config/firebase-config-compat.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-yellow: #eab308;
            --accent-purple: #a855f7;
            --border-color: #334155;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        h1 { text-align: center; margin-bottom: 10px; font-size: 28px; }

        .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 30px; }

        .admin-warning {
            background: var(--accent-red);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--accent-blue); color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: var(--accent-green); color: white; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: var(--accent-red); color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .filter-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .filter-row select {
            padding: 10px 15px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .stat {
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-value { font-size: 24px; font-weight: 700; color: var(--accent-blue); }
        .stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
        }

        .game-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .game-card.final { border-color: var(--accent-green); }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .game-round {
            background: var(--accent-purple);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .game-status { padding: 4px 10px; border-radius: 20px; font-weight: 600; }
        .game-status.final { background: var(--accent-green); color: white; }
        .game-status.pending { background: var(--accent-yellow); color: black; }

        .matchup-id { color: var(--text-secondary); font-size: 11px; }

        .team-row {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .team-row:hover { background: rgba(255,255,255,0.1); }
        .team-row.winner {
            background: rgba(34, 197, 94, 0.2);
            border: 2px solid var(--accent-green);
        }
        .team-row.winner::after {
            content: '✓ WINNER';
            margin-left: auto;
            color: var(--accent-green);
            font-weight: 700;
            font-size: 12px;
        }

        .team-seed {
            width: 30px;
            height: 30px;
            background: var(--accent-blue);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            margin-right: 12px;
        }

        .team-name { flex: 1; font-weight: 600; }

        .team-score {
            width: 50px;
            padding: 5px;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            text-align: center;
            font-weight: 600;
        }

        .game-actions { display: flex; gap: 10px; margin-top: 15px; }
        .game-actions .btn { flex: 1; padding: 10px; font-size: 12px; }

        .loading { text-align: center; padding: 50px; color: var(--text-secondary); }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            background: var(--accent-green);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
        .toast.error { background: var(--accent-red); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .login-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .login-box {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        .login-box h2 { margin-bottom: 20px; }
        .login-box button {
            padding: 15px 30px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .espn-section {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .espn-section h3 { margin-bottom: 15px; color: var(--accent-blue); }
        .espn-games { max-height: 300px; overflow-y: auto; }

        .espn-game {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .espn-game.final { border-left: 3px solid var(--accent-green); }
    </style>
</head>
<body>
    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <h2>🏀 NerdMadness Results Admin</h2>
            <p style="color: var(--text-secondary); margin-bottom: 20px;">Admin access required</p>
            <button onclick="signIn()">Sign In with Google</button>
        </div>
    </div>

    <div class="container" id="main-content" style="display: none;">
        <a href="nerdmadness.html" style="color: var(--accent-blue); text-decoration: none; display: inline-block; margin-bottom: 15px;">&larr; Back to NerdMadness</a>
        <h1>🏀 NerdMadness Game Results</h1>
        <p class="subtitle">Mark game winners and sync ESPN results</p>

        <div class="admin-warning" id="admin-warning">You are not authorized to access this page.</div>

        <div class="controls">
            <button class="btn btn-primary" onclick="fetchESPNGames()">📡 Fetch ESPN Data</button>
            <button class="btn btn-success" onclick="autoSyncFromESPN()">🔄 Auto-Sync Final Games</button>
            <button class="btn btn-primary" onclick="loadMatchups()">🔃 Refresh</button>
        </div>

        <div class="espn-section" id="espn-section" style="display: none;">
            <h3>📡 ESPN Tournament Games</h3>
            <div class="espn-games" id="espn-games"></div>
        </div>

        <div class="stats-bar" id="stats-bar">
            <div class="stat">
                <div class="stat-value" id="total-games">0</div>
                <div class="stat-label">Total Games</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="completed-games">0</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="pending-games">0</div>
                <div class="stat-label">Pending</div>
            </div>
        </div>

        <div class="filter-row">
            <select id="filter-round" onchange="filterGames()">
                <option value="">All Rounds</option>
                <option value="round_of_64">Round of 64</option>
                <option value="round_of_32">Round of 32</option>
                <option value="sweet_16">Sweet 16</option>
                <option value="elite_eight">Elite Eight</option>
                <option value="final_four">Final Four</option>
                <option value="championship">Championship</option>
            </select>
            <select id="filter-region" onchange="filterGames()">
                <option value="">All Regions</option>
                <option value="east">East</option>
                <option value="south">South</option>
                <option value="west">West</option>
                <option value="midwest">Midwest</option>
            </select>
            <select id="filter-status" onchange="filterGames()">
                <option value="">All Status</option>
                <option value="pending">Pending</option>
                <option value="final">Final</option>
            </select>
        </div>

        <div class="games-grid" id="games-grid">
            <div class="loading">Loading matchups...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = window.getFirebaseConfig();
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const BASE = 'artifacts/nerdbasketball/pools/nerdmadness_2026';
        const ADMIN_UIDS = ['WxSPmEildJdqs6T5hIpBUZrscwt2', 'BPQvRhpVl1ZzsBXaS7C2iFe2Xpc2'];
        const ESPN_API = 'https://site.api.espn.com/apis/site/v2/sports/basketball/mens-college-basketball/scoreboard';

        let matchups = {};
        let teams = {};
        let currentUser = null;

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                if (!ADMIN_UIDS.includes(user.uid)) {
                    document.getElementById('login-overlay').style.display = 'none';
                    document.getElementById('main-content').style.display = 'block';
                    document.getElementById('admin-warning').style.display = 'block';
                    return;
                }
                currentUser = user;
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                await loadData();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('main-content').style.display = 'none';
            }
        });

        function signIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        async function loadData() {
            const [teamsSnap, matchupsSnap] = await Promise.all([
                db.collection(`${BASE}/teams`).get(),
                db.collection(`${BASE}/matchups`).get()
            ]);
            teams = {};
            teamsSnap.forEach(doc => { teams[doc.id] = doc.data(); });
            matchups = {};
            matchupsSnap.forEach(doc => { matchups[doc.id] = doc.data(); });
            renderMatchups();
            updateStats();
        }

        async function loadMatchups() {
            await loadData();
            showToast('Refreshed');
        }

        function updateStats() {
            const total = Object.keys(matchups).length;
            const completed = Object.values(matchups).filter(m => m.winner_team_id).length;
            document.getElementById('total-games').textContent = total;
            document.getElementById('completed-games').textContent = completed;
            document.getElementById('pending-games').textContent = total - completed;
        }

        function renderMatchups() {
            const grid = document.getElementById('games-grid');
            const roundFilter = document.getElementById('filter-round').value;
            const regionFilter = document.getElementById('filter-region').value;
            const statusFilter = document.getElementById('filter-status').value;

            let filtered = Object.entries(matchups);
            if (roundFilter) filtered = filtered.filter(([id, m]) => m.round_id === roundFilter);
            if (regionFilter) filtered = filtered.filter(([id, m]) => m.region_id === regionFilter);
            if (statusFilter) {
                if (statusFilter === 'final') filtered = filtered.filter(([id, m]) => m.winner_team_id);
                else filtered = filtered.filter(([id, m]) => !m.winner_team_id);
            }

            const roundOrder = ['round_of_64', 'round_of_32', 'sweet_16', 'elite_eight', 'final_four', 'championship'];
            filtered.sort((a, b) => {
                const roundA = roundOrder.indexOf(a[1].round_id);
                const roundB = roundOrder.indexOf(b[1].round_id);
                if (roundA !== roundB) return roundA - roundB;
                return (a[1].bracket_position || 0) - (b[1].bracket_position || 0);
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="loading">No games match filter</div>';
                return;
            }

            grid.innerHTML = filtered.map(([id, m]) => renderGameCard(id, m)).join('');
        }

        function renderGameCard(matchupId, m) {
            const topTeam = teams[m.top_team_id];
            const bottomTeam = teams[m.bottom_team_id];
            const hasWinner = !!m.winner_team_id;
            const roundName = formatRound(m.round_id);
            const regionName = m.region_id ? m.region_id.toUpperCase() : 'FINAL';

            const topTeamName = topTeam?.team_name || 'TBD';
            const bottomTeamName = bottomTeam?.team_name || 'TBD';
            const topSeed = topTeam?.seed || m.top_seed || '?';
            const bottomSeed = bottomTeam?.seed || m.bottom_seed || '?';

            const isTopWinner = m.winner_team_id === m.top_team_id;
            const isBottomWinner = m.winner_team_id === m.bottom_team_id;

            return `
                <div class="game-card ${hasWinner ? 'final' : ''}">
                    <div class="game-header">
                        <span class="game-round">${roundName}</span>
                        <span class="matchup-id">${matchupId} | ${regionName}</span>
                        <span class="game-status ${hasWinner ? 'final' : 'pending'}">${hasWinner ? 'FINAL' : 'PENDING'}</span>
                    </div>
                    <div class="team-row ${isTopWinner ? 'winner' : ''}" onclick="selectWinner('${matchupId}', '${m.top_team_id}')">
                        <div class="team-seed">${topSeed}</div>
                        <div class="team-name">${topTeamName}</div>
                        <input type="number" class="team-score" id="score-${matchupId}-top" value="${m.top_team_score || ''}" placeholder="0" onclick="event.stopPropagation()">
                    </div>
                    <div class="team-row ${isBottomWinner ? 'winner' : ''}" onclick="selectWinner('${matchupId}', '${m.bottom_team_id}')">
                        <div class="team-seed">${bottomSeed}</div>
                        <div class="team-name">${bottomTeamName}</div>
                        <input type="number" class="team-score" id="score-${matchupId}-bottom" value="${m.bottom_team_score || ''}" placeholder="0" onclick="event.stopPropagation()">
                    </div>
                    <div class="game-actions">
                        <button class="btn btn-success" onclick="saveGame('${matchupId}')">💾 Save</button>
                        ${hasWinner ? `<button class="btn btn-danger" onclick="clearWinner('${matchupId}')">🗑️ Clear</button>` : ''}
                    </div>
                </div>
            `;
        }

        function formatRound(roundId) {
            const names = {
                'round_of_64': 'Round of 64',
                'round_of_32': 'Round of 32',
                'sweet_16': 'Sweet 16',
                'elite_eight': 'Elite Eight',
                'final_four': 'Final Four',
                'championship': 'Championship'
            };
            return names[roundId] || roundId;
        }

        function selectWinner(matchupId, teamId) {
            if (!teamId || teamId === 'undefined' || teamId === 'null') {
                showToast('Cannot select TBD team', true);
                return;
            }
            matchups[matchupId].winner_team_id = teamId;
            renderMatchups();
        }

        async function saveGame(matchupId) {
            const m = matchups[matchupId];
            const topScore = parseInt(document.getElementById(`score-${matchupId}-top`)?.value) || 0;
            const bottomScore = parseInt(document.getElementById(`score-${matchupId}-bottom`)?.value) || 0;

            if (!m.winner_team_id) {
                showToast('Select a winner first', true);
                return;
            }

            try {
                await db.doc(`${BASE}/matchups/${matchupId}`).update({
                    winner_team_id: m.winner_team_id,
                    top_team_score: topScore,
                    bottom_team_score: bottomScore,
                    status: 'FINAL',
                    updated_at: firebase.firestore.FieldValue.serverTimestamp(),
                    updated_by: currentUser.uid
                });

                matchups[matchupId].top_team_score = topScore;
                matchups[matchupId].bottom_team_score = bottomScore;
                matchups[matchupId].status = 'FINAL';

                showToast(`${matchupId} saved!`);
                updateStats();
                renderMatchups();
            } catch (error) {
                console.error('Error saving:', error);
                showToast('Error saving', true);
            }
        }

        async function clearWinner(matchupId) {
            if (!confirm('Clear winner?')) return;
            try {
                await db.doc(`${BASE}/matchups/${matchupId}`).update({
                    winner_team_id: firebase.firestore.FieldValue.delete(),
                    top_team_score: firebase.firestore.FieldValue.delete(),
                    bottom_team_score: firebase.firestore.FieldValue.delete(),
                    status: firebase.firestore.FieldValue.delete()
                });
                delete matchups[matchupId].winner_team_id;
                delete matchups[matchupId].top_team_score;
                delete matchups[matchupId].bottom_team_score;
                delete matchups[matchupId].status;
                showToast('Cleared');
                updateStats();
                renderMatchups();
            } catch (error) {
                console.error('Error:', error);
                showToast('Error', true);
            }
        }

        function filterGames() { renderMatchups(); }

        async function fetchESPNGames() {
            const section = document.getElementById('espn-section');
            const container = document.getElementById('espn-games');
            section.style.display = 'block';
            container.innerHTML = '<div class="loading">Fetching ESPN...</div>';

            try {
                const response = await fetch(ESPN_API);
                const data = await response.json();

                const tournamentGames = (data.events || []).filter(event => {
                    const notes = event.notes || [];
                    return notes.some(n => n.headline && n.headline.includes('NCAA Men\'s Basketball Championship'));
                });

                if (tournamentGames.length === 0) {
                    container.innerHTML = '<div style="color: var(--text-secondary);">No tournament games found</div>';
                    return;
                }

                container.innerHTML = tournamentGames.map(game => {
                    const competitors = game.competitions?.[0]?.competitors || [];
                    const team1 = competitors[0];
                    const team2 = competitors[1];
                    const isFinal = game.status?.type?.name === 'STATUS_FINAL';
                    const status = game.status?.type?.shortDetail || 'Scheduled';

                    return `
                        <div class="espn-game ${isFinal ? 'final' : ''}">
                            <div>
                                <strong>${team1?.team?.shortDisplayName || '?'}</strong> ${team1?.score || '-'} vs
                                <strong>${team2?.team?.shortDisplayName || '?'}</strong> ${team2?.score || '-'}
                            </div>
                            <div style="color: ${isFinal ? 'var(--accent-green)' : 'var(--text-secondary)'}">${status}</div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('ESPN error:', error);
                container.innerHTML = '<div style="color: var(--accent-red);">Error fetching ESPN</div>';
            }
        }

        async function autoSyncFromESPN() {
            showToast('Syncing...');
            try {
                const response = await fetch('https://testnerdmadnessupdate-np7uealtnq-uc.a.run.app');
                const result = await response.json();
                if (result.success) {
                    showToast(`Synced ${result.updated} games!`);
                    await loadData();
                } else {
                    showToast('Sync failed: ' + (result.error || 'Unknown'), true);
                }
            } catch (error) {
                console.error('Sync error:', error);
                showToast('Sync error', true);
            }
        }

        function showToast(message, isError = false) {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
