        .container {

    <script>
        const firebaseConfig = window.getFirebaseConfig();
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const BASE = 'artifacts/nerdbasketball/pools/nerdmadness_2026';

        function signIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                document.body.classList.add('logged-in');
                console.log('🔥 UPSETS', 'User logged in');
            } else {
                document.body.classList.remove('logged-in');
                console.log('🔥 UPSETS', 'User not logged in');
            }
        });

        const ROUND_MULTIPLIERS = {
            'round_of_64': 1,
            'round_of_32': 2,
            'sweet_16': 4,
            'elite_8': 8,
            'final_four': 16,
            'championship': 32
        };

        const MATCHUP_ID_TO_ROUND = {
            'R1': 'round_of_64',
            'R2': 'round_of_32',
            'R3': 'sweet_16',
            'R4': 'elite_8',
            'R5': 'final_four',
            'R6': 'championship'
        };

        const ROUND_DISPLAY_NAMES = {
            'round_of_64': 'Round of 64',
            'round_of_32': 'Round of 32',
            'sweet_16': 'Sweet 16',
            'elite_8': 'Elite 8',
            'final_four': 'Final Four',
            'championship': 'Championship'
        };

        function getMatchupRound(matchupId) {
            const prefix = matchupId.substring(0, 2);
            return MATCHUP_ID_TO_ROUND[prefix] || 'round_of_64';
        }

        // Feeder mapping: which games feed into which
        // R1_G01 + R1_G02 → R2_G01, etc.
        function getFeederMatchups(matchupId) {
            const prefix = matchupId.substring(0, 2);
            const gameNum = parseInt(matchupId.split('_G')[1]);

            if (prefix === 'R1') return null; // No feeders for Round 1

            const prevRound = {
                'R2': 'R1', 'R3': 'R2', 'R4': 'R3', 'R5': 'R4', 'R6': 'R5'
            }[prefix];

            if (!prevRound) return null;

            // Calculate feeder game numbers
            const topFeederNum = (gameNum * 2) - 1;
            const bottomFeederNum = gameNum * 2;

            return {
                top: `${prevRound}_G${String(topFeederNum).padStart(2, '0')}`,
                bottom: `${prevRound}_G${String(bottomFeederNum).padStart(2, '0')}`
            };
        }

        // Get the two teams playing in a matchup based on bracket picks
        function getMatchupTeams(matchupId, picks, matchups, teams) {
            const matchup = matchups[matchupId];
            if (!matchup) return { topTeam: null, bottomTeam: null };

            // Round of 64 has teams directly
            if (matchup.top_team_id && matchup.bottom_team_id) {
                return {
                    topTeam: teams[matchup.top_team_id],
                    bottomTeam: teams[matchup.bottom_team_id]
                };
            }

            // Later rounds: derive from picks in feeder matchups
            const feeders = getFeederMatchups(matchupId);
            if (!feeders) return { topTeam: null, bottomTeam: null };

            const topTeamId = picks[feeders.top];
            const bottomTeamId = picks[feeders.bottom];

            return {
                topTeam: topTeamId ? teams[topTeamId] : null,
                bottomTeam: bottomTeamId ? teams[bottomTeamId] : null
            };
        }

        let allBrackets = [];
        let matchups = {};
        let teams = {};
        let userCache = {};
        let bracketUpsets = [];
        let currentFilter = 'all';

        async function loadMatchupsAndTeams() {
            const [matchupsSnap, teamsSnap] = await Promise.all([
                db.collection(`${BASE}/matchups`).get(),
                db.collection(`${BASE}/teams`).get()
            ]);

            matchupsSnap.forEach(doc => { matchups[doc.id] = doc.data(); });
            teamsSnap.forEach(doc => { teams[doc.id] = { id: doc.id, ...doc.data() }; });

            console.log('🔥 UPSET_TRACKER', 'Loaded', Object.keys(matchups).length, 'matchups,', Object.keys(teams).length, 'teams');
        }

        async function loadUserDisplayName(userId) {
            if (userCache[userId]) return userCache[userId];
            try {
                const userDoc = await db.doc(`artifacts/nerdfootball/public/data/nerdfootball_users/${userId}`).get();
                if (userDoc.exists) {
                    const data = userDoc.data();
                    userCache[userId] = data.displayName || data.email || 'Unknown';
                } else {
                    userCache[userId] = 'Unknown';
                }
            } catch (e) {
                userCache[userId] = 'Unknown';
            }
            return userCache[userId];
        }

        async function loadAllBrackets() {
            const bracketsSnap = await db.collection(`${BASE}/brackets`)
                .where('active', '==', true)
                .get();

            allBrackets = [];
            const userPromises = [];

            bracketsSnap.forEach(doc => {
                const data = doc.data();
                if (data.isComplete) {
                    allBrackets.push({ id: doc.id, ...data });
                    userPromises.push(loadUserDisplayName(data.userId));
                }
            });

            await Promise.all(userPromises);
            console.log('🔥 UPSET_TRACKER', 'Loaded', allBrackets.length, 'complete brackets');
        }

        function analyzeUpsets() {
            bracketUpsets = [];

            let totalUpsets = 0;
            let correctUpsets = 0;
            let wrongUpsets = 0;
            let pendingUpsets = 0;

            for (const bracket of allBrackets) {
                if (!bracket.picks) continue;

                const upsets = [];

                for (const [matchupId, pickedTeamId] of Object.entries(bracket.picks)) {
                    const matchup = matchups[matchupId];
                    if (!matchup) continue;

                    const pickedTeam = teams[pickedTeamId];
                    if (!pickedTeam) continue;

                    // Get the two teams in this matchup (works for all rounds)
                    const { topTeam, bottomTeam } = getMatchupTeams(matchupId, bracket.picks, matchups, teams);
                    if (!topTeam || !bottomTeam) continue;

                    const pickedSeed = pickedTeam.seed || 1;
                    const topSeed = topTeam.seed || 1;
                    const bottomSeed = bottomTeam.seed || 16;

                    // Determine if this is an upset pick (lower seed beating higher seed)
                    let isUpset = false;
                    let opponentTeam = null;

                    // Find which team is the opponent
                    if (pickedTeamId === topTeam.id || pickedTeam.team_name === topTeam.team_name) {
                        opponentTeam = bottomTeam;
                        // Upset if picked team has higher seed number (worse seed)
                        if (topSeed > bottomSeed) isUpset = true;
                    } else if (pickedTeamId === bottomTeam.id || pickedTeam.team_name === bottomTeam.team_name) {
                        opponentTeam = topTeam;
                        if (bottomSeed > topSeed) isUpset = true;
                    } else {
                        continue; // Pick doesn't match either team
                    }

                    if (!isUpset) continue;

                    const round = getMatchupRound(matchupId);
                    const multiplier = ROUND_MULTIPLIERS[round] || 1;
                    const pts = multiplier * pickedSeed;

                    let status = 'pending';
                    if (matchup.winner_team_id && matchup.status === 'FINAL') {
                        status = (pickedTeamId === matchup.winner_team_id) ? 'correct' : 'wrong';
                    }

                    upsets.push({
                        matchupId,
                        pickedTeam,
                        pickedTeamId,
                        opponentTeam,
                        round,
                        roundName: ROUND_DISPLAY_NAMES[round] || round,
                        region: matchup.region_id,
                        status,
                        points: pts,
                        pickedSeed,
                        opponentSeed: opponentTeam?.seed || 1
                    });

                    totalUpsets++;
                    if (status === 'correct') correctUpsets++;
                    else if (status === 'wrong') wrongUpsets++;
                    else pendingUpsets++;
                }

                if (upsets.length > 0) {
                    const correctCount = upsets.filter(u => u.status === 'correct').length;
                    const wrongCount = upsets.filter(u => u.status === 'wrong').length;
                    const pendingCount = upsets.filter(u => u.status === 'pending').length;
                    const earnedPoints = upsets.filter(u => u.status === 'correct').reduce((sum, u) => sum + u.points, 0);

                    bracketUpsets.push({
                        bracket,
                        userName: userCache[bracket.userId] || 'Unknown',
                        upsets,
                        correctCount,
                        wrongCount,
                        pendingCount,
                        earnedPoints
                    });
                }
            }

            bracketUpsets.sort((a, b) => {
                if (b.correctCount !== a.correctCount) return b.correctCount - a.correctCount;
                return b.earnedPoints - a.earnedPoints;
            });

            document.getElementById('total-upsets').textContent = totalUpsets;
            document.getElementById('correct-upsets').textContent = correctUpsets;
            document.getElementById('wrong-upsets').textContent = wrongUpsets;
            document.getElementById('pending-upsets').textContent = pendingUpsets;
        }

        function renderBrackets() {
            const container = document.getElementById('brackets-container');

            const filteredBrackets = bracketUpsets.filter(b => {
                if (currentFilter === 'all') return true;
                return b.upsets.some(u => u.status === currentFilter);
            });

            if (filteredBrackets.length === 0) {
                container.innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">🔥</div>
                        <p>No upset picks found${currentFilter !== 'all' ? ' with this filter' : ''}.</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredBrackets.map(b => {
                const filteredUpsets = currentFilter === 'all'
                    ? b.upsets
                    : b.upsets.filter(u => u.status === currentFilter);

                return `
                    <div class="bracket-card">
                        <div class="bracket-header" onclick="window.location.href='nerdmadness-bracket-canvas.html?bracketId=${b.bracket.id}'">
                            <div class="bracket-info">
                                <div class="bracket-name">${b.bracket.bracketName || 'Unnamed Bracket'}</div>
                                <div class="bracket-user">${b.userName}</div>
                            </div>
                            <div class="bracket-stats">
                                <div class="bracket-stat">
                                    <div class="bracket-stat-value correct">${b.correctCount}</div>
                                    <div class="bracket-stat-label">Correct</div>
                                </div>
                                <div class="bracket-stat">
                                    <div class="bracket-stat-value wrong">${b.wrongCount}</div>
                                    <div class="bracket-stat-label">Wrong</div>
                                </div>
                                <div class="bracket-stat">
                                    <div class="bracket-stat-value pending">${b.pendingCount}</div>
                                    <div class="bracket-stat-label">Pending</div>
                                </div>
                            </div>
                        </div>
                        <div class="upset-list">
                            ${filteredUpsets.map(u => renderUpsetItem(u)).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderUpsetItem(upset) {
            const icon = upset.status === 'correct' ? '✅' : (upset.status === 'wrong' ? '❌' : '🔥');
            const pickedName = upset.pickedTeam?.team_name || 'Unknown';
            const opponentName = upset.opponentTeam?.team_name || 'Unknown';

            let pointsHtml = '';
            let statusText = '';
            if (upset.status === 'correct') {
                pointsHtml = `<div class="upset-points earned">+${upset.points}</div>`;
                statusText = 'Nailed it!';
            } else if (upset.status === 'wrong') {
                pointsHtml = `<div class="upset-points lost">0</div>`;
                statusText = 'Busted';
            } else {
                pointsHtml = `<div class="upset-points potential">(${upset.points})</div>`;
                statusText = 'Waiting...';
            }

            return `
                <div class="upset-item ${upset.status}">
                    <div class="upset-icon">${icon}</div>
                    <div class="upset-details">
                        <div class="upset-matchup">
                            <span class="seed">#${upset.pickedSeed}</span> ${pickedName}
                            <span class="vs">over</span>
                            <span class="seed">#${upset.opponentSeed}</span> ${opponentName}
                        </div>
                        <div class="upset-round">${upset.roundName} • ${upset.region || 'Final Four'}</div>
                    </div>
                    <div class="upset-result">
                        ${pointsHtml}
                        <div class="upset-status">${statusText}</div>
                    </div>
                </div>
            `;
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderBrackets();
            });
        });

        async function init() {
            try {
                await loadMatchupsAndTeams();
                await loadAllBrackets();
                analyzeUpsets();
                renderBrackets();
            } catch (e) {
                console.error('🔥 UPSET_TRACKER', 'Error:', e);
                document.getElementById('brackets-container').innerHTML = `
                    <div class="no-data">
                        <div class="no-data-icon">⚠️</div>
                        <p>Error loading upset data. Please try again.</p>
                    </div>
                `;
            }
        }

        init();
    </script>
</body>
</html>
